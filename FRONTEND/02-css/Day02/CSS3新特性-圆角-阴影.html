<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box2 {
        width: 100px;
        height: 100px;
        background-color: rgb(187, 102, 16);
        position: absolute;
        left: 50px;
        top: 50px;
        z-index: 3;
        border-radius: 30px 5px 30px 5px;
      }
      .box3 {
        width: 200px; 
        height: 200px;
        background-color: rgb(187, 132, 202);
        position: absolute;
        left: 100px;
        top: 100px;
        z-index: 2;
        border-radius: 100%;
      }
      .box4 {
        width: 400px; 
        height: 400px;
        background-color: rgb(49, 204, 57);
        margin: 0 auto;
        box-shadow: 10px 10px 10px rgba(23, 110, 26, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="box2">Box 2</div>
    <div class="box3">Box 3</div>
    <div class="box4">margin: 0 auto让左右空间平均分配</div>
  </body>
</html>
