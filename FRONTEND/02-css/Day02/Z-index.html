<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box2 {
        width: 100px;
        height: 100px;
        background-color: rgb(187, 102, 16);
        position: absolute;
        left: 50px;
        top: 50px;
        z-index: 3;
      }
      .box3 {
        width: 200px;
        height: 200px;
        background-color: rgb(187, 132, 202);
        position: absolute;
        left: 100px;
        top: 100px;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    z-index可以调整图层级别
    <div class="box2">Box 2（z-index: 3）</div>
    <div class="box3">Box 3（z-index: 2）</div>
  </body>
</html>
