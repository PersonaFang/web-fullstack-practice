<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            color:aquamarine;
            font-size: 50px;
            font-family: "微软雅黑";
            font-style: italic;
            font-weight: bold;
        }
        div{
            width: 400px;
            height: 300px;
            background-color: rgba(28, 204, 204, 0.5);
            background-image: url( ./image2.jpg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }
        h3{
            text-align: center;
            text-decoration: line-through;
        }
        table {
            border-collapse: collapse;
        } 
        th, td {
            border: 1px solid black;
            padding: 8px 16px;
        }
    </style>
</head>
<body>
    <p>这是一个段落</p>
    <div>这是一个div</div>
    <h3>Hello world!</h3>
    <table>
        <tr>
            <th>姓名</th>
            <th>年龄</th>
            <th>性别</th>
        </tr>
        <tr>
            <td>张三</td>
            <td>18</td>
            <td>男</td>
        </tr>
        <tr>
            <td>李四</td>
            <td>20</td>
            <td>女</td>
        </tr>
</body>
</html>
