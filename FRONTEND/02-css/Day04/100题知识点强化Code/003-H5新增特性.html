<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- HTML4 只有 text、password、radio 等几种 -->
    <!-- HTML5 新增了很多实用的 type -->
    <input type="email" />
    <!-- 自动校验邮箱格式 -->
    <input type="tel" />
    <!-- 手机会弹出数字键盘 -->
    <input type="number" />
    <!-- 只能输数字 -->
    <input type="date" />
    <!-- 弹出日期选择器 -->
    <input type="range" />
    <!-- 滑动条 -->
    <input type="color" />
    <!-- 颜色选择器 -->
    <input type="search" />
    <!-- 搜索框（带清除按钮）-->

    <!-- 新属性 -->
    <input placeholder="请输入用户名" />
    <!-- 提示文字 -->
    <input required />
    <!-- 必填校验 -->
    <input autofocus />
    <!-- 自动聚焦 -->

  </body>
</html>
