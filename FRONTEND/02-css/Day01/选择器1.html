<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

        *{
            font-size: 20px;
            color: rgba(171, 126, 34, 0.471);

        span{
            font-size: 40px;
            color: rgba(13, 113, 129, 0.471);

        .one-class{

        }
        .two-class{
            color: rgba(131, 224, 235, 0.471);

        }
    </style>
</head>
<body>
    <p>CSS选择器</p>
    <h1>CSS选择器<span>h1</span></h1>
    <h2 class="one-class">类选择器  </h2>

</html>
