        function timeout(ms) {
          return new Promise((resolve, reject) => {
            setTimeout(function () {
              console.log("定时器");
              resolve();
            }, ms);
          });
        }
        async function asyncPrint(ms, value) {
          await timeout(ms);
          console.log(value);
        }
        asyncPrint(100, "Hello");
    </script>
